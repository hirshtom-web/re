<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SFR Investment Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}


body{

font-family:Inter,Arial,sans-serif;

background:#f5f5f5;

height:100vh;

display:flex;

justify-content:center;

color:#111;

}



.app{

width:100%;

max-width:430px;

height:100vh;

background:#fff;

display:flex;

flex-direction:column;

overflow:hidden;

}



.header{

padding:20px;

border-bottom:1px solid #eee;

}



.header h1{

font-size:24px;

font-weight:700;

}




.top-inputs{

padding:18px 20px 10px;

}



label{

font-size:13px;

font-weight:600;

color:#777;

display:block;

margin-bottom:7px;

}




input,
select{

width:100%;

height:48px;

border:none;

background:#f3f3f3;

border-radius:12px;

font-size:16px;

padding:0 14px;

outline:none;

}



.input-group{

margin-bottom:14px;

}




.tabs{

display:flex;

margin:0 20px;

border-bottom:1px solid #ddd;

}



.tab{

flex:1;

height:45px;

background:none;

border:none;

font-size:16px;

font-weight:600;

color:#999;

}



.tab.active{

color:#111;

border-bottom:3px solid #111;

}




.content{

padding:15px 20px;

flex:1;

overflow:hidden;

}



.panel{

display:none;

}


.panel.active{

display:block;

}




.cash-toggle{

margin-bottom:15px;

}



.cash-toggle button{

background:none;

border:none;

font-size:16px;

font-weight:600;

color:#2563eb;

text-decoration:underline;

}



.dual{

margin-bottom:15px;

}


.dual-row{

height:48px;

background:#f3f3f3;

border-radius:12px;

display:flex;

overflow:hidden;

}



.money-side{

flex:1;

display:flex;

align-items:center;

padding-left:12px;

}



.money-side span{

color:#777;

}


.money-side input{

background:none;

padding-left:6px;

}



.percent-side{

width:85px;

border-left:1px solid #ddd;

display:flex;

align-items:center;

padding:0 8px;

}



.percent-side input{

background:none;

padding:0;

font-size:14px;

width:55px;

}



.percent-side span{

font-size:14px;

color:#777;

}




.small-grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

}




.results{

background:#111;

color:white;

border-radius:24px 24px 0 0;

padding:18px 20px;

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

}



.result{

background:#1c1c1c;

border-radius:14px;

padding:12px;

}



.result small{

display:block;

font-size:12px;

color:#aaa;

margin-bottom:5px;

}



.result strong{

font-size:22px;

}



.green{

color:#34d399;

}


.red{

color:#f87171;

}




</style>

</head>


<body>


<div class="app">


<div class="header">

<h1>SFR Calculator</h1>

</div>



<div class="top-inputs">


<div class="input-group">

<label>Purchase Price</label>

<input id="purchasePrice" value="350000" type="number">

</div>



<div class="input-group">

<label>Monthly Rent</label>

<input id="rent" value="2650" type="number">

</div>


</div>





<div class="tabs">


<button class="tab active" data-tab="finance">
Financing
</button>


<button class="tab" data-tab="expenses">
Expenses
</button>


</div>





<div class="content">


<div id="finance" class="panel active">



<div class="cash-toggle">

<button id="cashDeal">
Cash Deal
</button>

</div>



<div class="small-grid">


<div class="input-group">

<label>Down %</label>

<input id="down" value="30" type="number">

</div>



<div class="input-group">

<label>Interest %</label>

<input id="rate" value="6.5" step=".01" type="number">

</div>


<div class="input-group">

<label>Loan Years</label>

<select id="years">

<option>15</option>

<option selected>30</option>

</select>

</div>


</div>


</div>





<div id="expenses" class="panel">



<div class="dual">


<label>Property Taxes</label>


<div class="dual-row">


<div class="money-side">

<span>$</span>

<input id="taxes" type="number">

</div>


<div class="percent-side">

<input id="taxRate" value="1" type="number">

<span>%</span>

</div>


</div>


</div>




<div class="dual">


<label>Insurance</label>


<div class="dual-row">


<div class="money-side">

<span>$</span>

<input id="insurance" type="number">

</div>


<div class="percent-side">

<input id="insuranceRate" value="1.5" type="number">

<span>%</span>

</div>


</div>


</div>





<div class="small-grid">


<div class="input-group">

<label>Management %</label>

<input id="management" value="8" type="number">

</div>



<div class="input-group">

<label>Maintenance %</label>

<input id="maintenance" value="5" type="number">

</div>



<div class="input-group">

<label>Vacancy %</label>

<input id="vacancy" value="5" type="number">

</div>


</div>



</div>


</div>





<div class="results">


<div class="result">

<small>Cash Flow</small>

<strong id="cashFlow">$0</strong>

</div>


<div class="result">

<small>Cap Rate</small>

<strong id="capRate">0%</strong>

</div>


<div class="result">

<small>Cash Required</small>

<strong id="cashRequired">$0</strong>

</div>


<div class="result">

<small>Cash On Cash</small>

<strong id="coc">0%</strong>

</div>


<div class="result">

<small>DSCR</small>

<strong id="dscr">0</strong>

</div>


<div class="result">

<small>NOI</small>

<strong id="noi">$0</strong>

</div>



</div>



</div>



<script>

/* =========================
   SFR CALCULATOR ENGINE
========================= */


let cashMode = false;



/* =========================
   ELEMENTS
========================= */

const purchasePrice = document.getElementById("purchasePrice");
const rent = document.getElementById("rent");

const down = document.getElementById("down");
const rate = document.getElementById("rate");
const years = document.getElementById("years");

const taxes = document.getElementById("taxes");
const taxRate = document.getElementById("taxRate");

const insurance = document.getElementById("insurance");
const insuranceRate = document.getElementById("insuranceRate");

const management = document.getElementById("management");
const maintenance = document.getElementById("maintenance");
const vacancy = document.getElementById("vacancy");


const cashFlow = document.getElementById("cashFlow");
const capRate = document.getElementById("capRate");
const cashRequired = document.getElementById("cashRequired");
const coc = document.getElementById("coc");
const dscr = document.getElementById("dscr");
const noiOutput = document.getElementById("noi");




/* =========================
   TABS
========================= */

document.querySelectorAll(".tab").forEach(button=>{

    button.addEventListener("click",()=>{


        document
        .querySelectorAll(".tab")
        .forEach(t=>t.classList.remove("active"));


        document
        .querySelectorAll(".panel")
        .forEach(p=>p.classList.remove("active"));



        button.classList.add("active");


        document
        .getElementById(button.dataset.tab)
        .classList.add("active");


    });

});





/* =========================
   CASH DEAL SWITCH
========================= */


document
.getElementById("cashDeal")
.addEventListener("click",function(){


cashMode = !cashMode;


this.textContent = cashMode
? "Financed Deal"
: "Cash Deal";



down.disabled = cashMode;
rate.disabled = cashMode;
years.disabled = cashMode;


calculate();


});





/* =========================
   AUTO TAX + INSURANCE
========================= */


function updateTax(){

    const price =
    Number(purchasePrice.value)||0;


    taxes.value =
    ((price * taxRate.value/100)/12)
    .toFixed(2);

}



function updateInsurance(){

    const price =
    Number(purchasePrice.value)||0;


    insurance.value =
    ((price * insuranceRate.value/100)/12)
    .toFixed(2);

}





purchasePrice.addEventListener("input",()=>{

updateTax();

updateInsurance();

calculate();

});



taxRate.addEventListener("input",()=>{

updateTax();

calculate();

});



insuranceRate.addEventListener("input",()=>{

updateInsurance();

calculate();

});





/* =========================
   MANUAL $ INPUT
========================= */


taxes.addEventListener("input",()=>{

const price =
Number(purchasePrice.value)||0;


taxRate.value =
(
(taxes.value*12)/price*100

).toFixed(2);


calculate();


});




insurance.addEventListener("input",()=>{


const price =
Number(purchasePrice.value)||0;


insuranceRate.value =
(
(insurance.value*12)/price*100

).toFixed(2);



calculate();


});







/* =========================
   MORTGAGE
========================= */


function mortgagePayment(
principal,
annualRate,
years
){

const monthlyRate =
annualRate/100/12;


const payments =
years*12;



if(monthlyRate===0){

return principal/payments;

}


return principal *

(
monthlyRate *
Math.pow(
1+monthlyRate,
payments
)

)

/

(
Math.pow(
1+monthlyRate,
payments
)-1

);


}






/* =========================
   FORMAT
========================= */


function money(value){

return "$" +

Math.round(value)
.toLocaleString();

}







/* =========================
   MAIN CALCULATION
========================= */


function calculate(){


const price =
Number(purchasePrice.value)||0;


const monthlyRent =
Number(rent.value)||0;



const tax =
Number(taxes.value)||0;


const ins =
Number(insurance.value)||0;



const managementCost =
monthlyRent *
(Number(management.value)||0)
/
100;



const maintenanceCost =
monthlyRent *
(Number(maintenance.value)||0)
/
100;



const vacancyCost =
monthlyRent *
(Number(vacancy.value)||0)
/
100;






let loanPayment = 0;

let cash = price;



if(!cashMode){


const downPayment =
Number(down.value)||0;


const loan =
price *
(1-downPayment/100);


cash =
price *
(downPayment/100);



loanPayment =
mortgagePayment(

loan,

Number(rate.value)||0,

Number(years.value)||30

);


}







const monthlyExpenses =

tax +

ins +

managementCost +

maintenanceCost +

vacancyCost;






const monthlyNOI =

monthlyRent -

monthlyExpenses;






const annualNOI =

monthlyNOI*12;






const flow =

monthlyNOI -

loanPayment;






const cap =

price

?

annualNOI/price*100

:

0;






const cashReturn =

cash

?

(flow*12)/cash*100

:

0;






const debtCoverage =

loanPayment

?

annualNOI/(loanPayment*12)

:

0;






cashFlow.textContent =
money(flow);



cashFlow.className =
flow>=0
?
"green"
:
"red";



capRate.textContent =
cap.toFixed(2)+"%";



cashRequired.textContent =
money(cash);



coc.textContent =
cashReturn.toFixed(2)+"%";



dscr.textContent =
cashMode
?
"N/A"
:
debtCoverage.toFixed(2);



noiOutput.textContent =
money(annualNOI);



}





/* =========================
   LIVE UPDATE
========================= */


document
.querySelectorAll("input,select")
.forEach(input=>{


input.addEventListener(
"input",
calculate
);


input.addEventListener(
"change",
calculate
);


});





/* =========================
   START VALUES
========================= */


updateTax();

updateInsurance();

calculate();

</script>


</body>

</html>
