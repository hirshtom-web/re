<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>SFR Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

  <style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{

height:100%;
font-family:Inter,sans-serif;
background:#f7f7f7;
color:#111;

}

body{

display:flex;
justify-content:center;

}

.app{

width:100%;
max-width:430px;

min-height:100vh;

background:#fff;

display:flex;
flex-direction:column;

}

header{

padding:22px 20px 14px;

}

header h1{

font-size:26px;
font-weight:700;

}

.main-inputs{

padding:0 20px;

}

.input{

margin-bottom:18px;

}

.input label{

display:block;

font-size:14px;

font-weight:600;

color:#666;

margin-bottom:8px;

}

.input input,
.input select{

width:100%;

height:52px;

font-size:16px;        /* prevents iPhone zoom */

border:none;

outline:none;

background:#f4f4f4;

border-radius:14px;

padding:0 16px;

appearance:none;

}

.input input:focus,
.input select:focus{

background:#ececec;

}

.tabs{

display:flex;

padding:0 20px;

margin-top:6px;

border-bottom:1px solid #ececec;

}

.tab{

flex:1;

height:48px;

border:none;

background:none;

font-size:16px;

font-weight:600;

cursor:pointer;

color:#999;

border-bottom:3px solid transparent;

transition:.25s;

}

.tab.active{

color:#111;

border-bottom:3px solid #111;

}

.tab-content{

display:none;

padding:18px 20px 10px;

animation:fade .2s;

}

.tab-content.active{

display:block;

}

@keyframes fade{

from{

opacity:.2;
transform:translateY(6px);

}

to{

opacity:1;
transform:none;

}

}

.cash-toggle{

margin-bottom:20px;

}

.cash-toggle button{

border:none;

background:none;

font-size:16px;

font-weight:600;

cursor:pointer;

padding:0;

color:#2563eb;

text-decoration:underline;

}

.results{

margin-top:auto;

padding:20px;

background:#111;

display:grid;

grid-template-columns:1fr 1fr;

gap:16px;

border-top-left-radius:24px;

border-top-right-radius:24px;

}

.results div{

background:#1b1b1b;

padding:16px;

border-radius:16px;

}

.results small{

display:block;

font-size:13px;

color:#aaa;

margin-bottom:6px;

}

.results strong{

font-size:24px;

font-weight:700;

color:white;

display:block;

}

.green{

color:#22c55e !important;

}

.red{

color:#ef4444 !important;

}

@media(max-height:760px){

.results{

gap:10px;
padding:16px;

}

.results strong{

font-size:20px;

}

.input{

margin-bottom:14px;

}

}
  </style>
<body>

<div class="app">

<header>

<h1>SFR Calculator</h1>

</header>


<div class="main-inputs">

<div class="input">

<label>Purchase Price</label>

<input
id="purchase"
type="number"
value="350000">

</div>

<div class="input">

<label>Monthly Rent</label>

<input
id="rent"
type="number"
value="2650">

</div>

</div>



<div class="tabs">

<button
class="tab active"
data-tab="finance">

Financing

</button>

<button
class="tab"
data-tab="expenses">

Expenses

</button>

</div>




<div
id="finance"
class="tab-content active">

<div class="cash-toggle">

<button id="cashDeal">

Cash Deal

</button>

</div>


<div class="input">

<label>Down Payment %</label>

<input
id="down"
type="number"
value="30">

</div>


<div class="input">

<label>Interest Rate %</label>

<input
id="rate"
type="number"
step=".01"
value="6.50">

</div>


<div class="input">

<label>Loan Term</label>

<select id="years">

<option>15</option>

<option selected>30</option>

</select>

</div>

</div>





<div
id="expenses"
class="tab-content">

<div class="input">

<label>Taxes</label>

<input
id="taxes"
type="number"
value="350">

</div>


<div class="input">

<label>Insurance</label>

<input
id="insurance"
type="number"
value="120">

</div>


<div class="input">

<label>Management %</label>

<input
id="management"
type="number"
value="8">

</div>


<div class="input">

<label>Maintenance %</label>

<input
id="maintenance"
type="number"
value="5">

</div>


<div class="input">

<label>Vacancy %</label>

<input
id="vacancy"
type="number"
value="5">

</div>

</div>




<div class="results">

<div>

<small>Cash Flow</small>

<strong id="cashFlow">$0</strong>

</div>

<div>

<small>Cap Rate</small>

<strong id="capRate">0%</strong>

</div>

<div>

<small>Cash Required</small>

<strong id="cashNeeded">$0</strong>

</div>

<div>

<small>Cash-on-Cash</small>

<strong id="coc">0%</strong>

</div>

<div>

<small>DSCR</small>

<strong id="dscr">0.00</strong>

</div>

</div>

</div>

<script>
  /* =========================
   SFR CALCULATOR
========================= */

let cashDeal = false;


/* =========================
   TABS
========================= */

document.querySelectorAll(".tab").forEach(tab=>{

    tab.onclick=function(){

        document
        .querySelectorAll(".tab")
        .forEach(t=>t.classList.remove("active"));

        document
        .querySelectorAll(".tab-content")
        .forEach(c=>c.classList.remove("active"));

        this.classList.add("active");

        document
        .getElementById(this.dataset.tab)
        .classList.add("active");

    };

});


/* =========================
   CASH DEAL
========================= */

cashDeal.onclick=function(){

    cashDeal = !cashDeal;

    this.textContent =
    cashDeal
    ? "Financed Deal"
    : "Cash Deal";

    document
    .getElementById("down")
    .closest(".input")
    .style.display = cashDeal ? "none" : "";

    document
    .getElementById("rate")
    .closest(".input")
    .style.display = cashDeal ? "none" : "";

    document
    .getElementById("years")
    .closest(".input")
    .style.display = cashDeal ? "none" : "";

    calculate();

};


/* =========================
   LIVE INPUTS
========================= */

document
.querySelectorAll("input,select")
.forEach(i=>{

    i.addEventListener("input",calculate);

});


/* =========================
   HELPERS
========================= */

function payment(principal,rate,years){

    const r = rate / 12;

    const n = years * 12;

    if(rate===0){

        return principal/n;

    }

    return principal *

    (r*Math.pow(1+r,n)) /

    (Math.pow(1+r,n)-1);

}


function money(value){

    return "$" +

    Math.round(value)

    .toLocaleString();

}



/* =========================
   CALCULATE
========================= */

function calculate(){

    const purchase =
    Number(price.value)||0;

    const rent =
    Number(rent.value)||0;

    const down =
    Number(down.value)/100||0;

    const rate =
    Number(rate.value)/100/12||0;

    const years =
    Number(years.value)||30;

    const taxes =
    Number(taxes.value)||0;

    const insurance =
    Number(insurance.value)||0;

    const management =
    rent *

    (Number(management.value)/100||0);

    const maintenance =
    rent *

    (Number(maintenance.value)/100||0);

    const vacancy =
    rent *

    (Number(vacancy.value)/100||0);



    let loan=0;

    let mortgage=0;

    let cashRequired=purchase;



    if(!cashDeal){

        loan = purchase*(1-down);

        mortgage =

        payment(

            loan,

            rate,

            years

        );

        cashRequired =
        purchase*down;

    }



    const operating =

    taxes+

    insurance+

    management+

    maintenance+

    vacancy;



    const noi =

    (rent*12)

    -

    (operating*12);



    const monthlyCash =

    rent

    -

    operating

    -

    mortgage;



    const cap =

    purchase

    ?

    (noi/purchase)*100

    :

    0;



    const coc =

    cashDeal

    ?

    cap

    :

    cashRequired

    ?

    ((monthlyCash*12)/cashRequired)*100

    :

    0;



    const dscr =

    mortgage

    ?

    noi/(mortgage*12)

    :

    0;



    cashFlow.textContent =
    money(monthlyCash);

    cashFlow.className =

    monthlyCash>=0

    ?

    "green"

    :

    "red";



    cashNeeded.textContent =
    money(cashRequired);



    capRate.textContent =
    cap.toFixed(2)+"%";



    coc.textContent =
    coc.toFixed(2)+"%";



    dscr.textContent =

    cashDeal

    ?

    "—"

    :

    dscr.toFixed(2);

}


/* =========================
   START
========================= */

calculate();
</script>

</body>
</html>
