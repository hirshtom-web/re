<section class="investment-score">

    <h2>
        Investment Snapshot
    </h2>

    <div class="score-wrapper">

        <div class="score-gauge">

            <div class="gauge-circle">

                <svg viewBox="0 0 120 120">

                    <circle
                    cx="60"
                    cy="60"
                    r="50"
                    class="gauge-bg"/>

                    <circle
                    cx="60"
                    cy="60"
                    r="50"
                    class="gauge-progress"/>

                </svg>


                <div class="gauge-center">

                    <strong id="scoreValue">
                        92
                    </strong>

                    <span id="scoreLabel">
                        Excellent
                    </span>

                </div>

            </div>

        </div>



        <div class="score-grid">


            <div class="score-card">

                <label>
                    Cash Flow
                </label>

                <strong id="cashflow">
                    A+
                </strong>

                <small>
                    Stable Income
                </small>

            </div>



            <div class="score-card">

                <label>
                    Risk
                </label>

                <strong id="risk">
                    Low
                </strong>

                <small>
                    Corporate Tenant
                </small>

            </div>



            <div class="score-card">

                <label>
                    Growth
                </label>

                <strong id="growth">
                    Strong
                </strong>

                <small>
                    Market Fundamentals
                </small>

            </div>



            <div class="score-card">

                <label>
                    Liquidity
                </label>

                <strong id="liquidity">
                    High
                </strong>

                <small>
                    Investor Demand
                </small>

            </div>


        </div>

    </div>


    <div class="score-summary">

        <h3>
            Overall Assessment
        </h3>

        <p>
            This asset represents a high-quality investment opportunity supported by strong tenant credit, stable cash flow, and long-term value creation potential.
        </p>

    </div>


</section>
