<!-- MORTGAGE CALCULATOR -->

<section class="mortgage-section">

<h2>
Mortgage Calculator
</h2>

<p class="mortgage-intro">
Estimate your monthly residence payment
</p>


<div class="mortgage-grid">


    <!-- INPUTS -->

    <div class="mortgage-inputs">


        <div class="mortgage-field">

            <label>
            Home Price
            </label>

            <input value="$1,850,000">

        </div>



        <div class="mortgage-field">

            <label>
            Down Payment
            </label>

            <input value="$370,000">

        </div>



        <div class="mortgage-field">

            <label>
            Interest Rate
            </label>

            <input value="6.5%">

        </div>



        <div class="mortgage-field">

            <label>
            Mortgage Period
            </label>

            <input value="30 Years">

        </div>



        <div class="mortgage-field">

            <label>
            HOA Fees
            </label>

            <input value="$1,234 / month">

        </div>


    </div>





    <!-- RESULT -->

   <!-- RESULT -->

<div class="mortgage-result">


    <div class="payment-header">


        <div>

            <span>
            Estimated Monthly Payment
            </span>


            <strong>
            $9,340
            </strong>


            <small>
            PER MONTH
            </small>

        </div>



        <div class="payment-ring"></div>


    </div>




    <div class="mortgage-breakdown">


        <div>
            <span>
            Principal & Interest
            </span>

            <strong>
            $8,900
            </strong>
        </div>



        <div>
            <span>
            Property Tax
            </span>

            <strong>
            $250
            </strong>
        </div>



        <div>
            <span>
            Insurance
            </span>

            <strong>
            $190
            </strong>
        </div>



        <div>
            <span>
            HOA
            </span>

            <strong>
            $0
            </strong>
        </div>



        <div>
            <span>
            PMI
            </span>

            <strong>
            $0
            </strong>
        </div>


    </div>



    <button class="mortgage-print">

        Print / Save PDF →

    </button>


</div>


</div>


</section>
