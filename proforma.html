<section class="proforma-widget">

<h2>Investment Proforma</h2>

<div class="proforma-tabs">

<button class="active" data-tab="acquisition">
Acquisition
</button>

<button data-tab="financing">
Financing
</button>

<button data-tab="operations">
Operations
</button>

<button data-tab="exit">
Exit
</button>

</div>


<div class="proforma-panel">


<div class="tab-content active" id="acquisition">

<div class="proforma-field">
<label>Purchase Price</label>
<input id="purchasePrice" value="3500000">
</div>

<div class="proforma-field">
<label>Annual NOI</label>
<input id="noi" value="288000">
</div>

</div>



<div class="tab-content" id="financing">

<div class="proforma-field">
<label>Down Payment %</label>
<input id="downPayment" value="35">
</div>

<div class="proforma-field">
<label>Interest Rate %</label>
<input id="interestRate" value="6.5">
</div>

<div class="proforma-field">
<label>Amortization Years</label>
<input id="amortization" value="25">
</div>

</div>



<div class="tab-content" id="operations">

<div class="proforma-field">
<label>NOI Growth %</label>
<input id="noiGrowth" value="3">
</div>

<div class="proforma-field">
<label>Vacancy %</label>
<input id="vacancy" value="5">
</div>

</div>



<div class="tab-content" id="exit">

<div class="proforma-field">
<label>Hold Period</label>
<input id="holdPeriod" value="10">
</div>

<div class="proforma-field">
<label>Exit Cap Rate %</label>
<input id="exitCap" value="7">
</div>

</div>


<button id="runProforma" class="run-button">
Run Proforma
</button>


</div>



<div class="proforma-results">

<div>
<span>Equity</span>
<strong id="resultEquity">$0</strong>
</div>

<div>
<span>Debt</span>
<strong id="resultDebt">$0</strong>
</div>

<div>
<span>Cash Flow</span>
<strong id="resultCashFlow">$0</strong>
</div>

<div>
<span>Cash-on-Cash</span>
<strong id="resultCoc">0%</strong>
</div>

<div>
<span>Exit Value</span>
<strong id="resultSale">$0</strong>
</div>

<div>
<span>Profit</span>
<strong id="resultProfit">$0</strong>
</div>

</div>

</section>
