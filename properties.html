<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
    
    <title>Properties</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/property-card.css">
    <link rel="stylesheet" href="../css/properties-grid.css">
    <link rel="stylesheet" href="../css/modal.css">

</head>


<body>

    <section class="properties-grid-section">

<div class="properties-grid" id="properties-grid"></div>

</section>


<div id="properties-grid-container"></div>

    
    
    <div class="modal" id="dealModal">

    <div class="modal-content">

        <div class="modal-header">

            <div class="modal-left">

                <button class="modal-btn" onclick="closeDeal()">

<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M15 18L9 12L15 6"/>
</svg>

Back

</button>

            </div>

            <div class="modal-center">

                <img
                    class="modal-logo"
                    src="https://static.wixstatic.com/shapes/1799ca_7155831ea6c34da28a5a12b76fe72255.svg"
                    alt="Logo">

            </div>

           <div class="modal-right">

<button class="icon-btn" onclick="downloadPDF()">
<span class="material-symbols-rounded">picture_as_pdf</span>
</button>

<div class="menu-wrapper">

<button class="icon-btn" onclick="toggleMenu()">
<span class="material-symbols-rounded">more_vert</span>
</button>

<div id="moreMenu" class="more-menu">

<button onclick="whatsappBroker()">
<span class="material-symbols-rounded">chat</span>
WhatsApp
</button>

<button onclick="callBroker()">
<span class="material-symbols-rounded">call</span>
Call
</button>

<button onclick="emailBroker()">
<span class="material-symbols-rounded">mail</span>
Email
</button>

<hr>

<button onclick="shareDeal()">
<span class="material-symbols-rounded">share</span>
Share
</button>

<button onclick="copyLink()">
<span class="material-symbols-rounded">content_copy</span>
Copy Link
</button>

<button onclick="visitWebsite()">
<span class="material-symbols-rounded">language</span>
Website
</button>

</div>

</div>

</div>

</div>

<iframe id="dealFrame"></iframe>

</div>

</div> 
    
<script src="../js/residences.js"></script>
<script src="../js/grid-renderer.js"></script>

<script src="../js/modal.js"></script>
<script src="../js/contact.js"></script>

<script src="data/propertyGrid.js"></script>

<script src="components/PropertyCard.js"></script>

<script src="pages/ResidencesGrid.js"></script>

    
</body>

</html>
